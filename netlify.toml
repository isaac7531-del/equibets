[build]
  command = "npm ci && npm run build"
  publish = "dist"

[[headers]]
  for = "/sw.js"

  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/manifest.webmanifest"

  [headers.values]
    Content-Type = "application/manifest+json"

[[redirects]]
  from = "https://www.equibets.app/*"
  to = "https://equibets.app/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
